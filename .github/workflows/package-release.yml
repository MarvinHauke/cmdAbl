name: Package & release

# Builds the .ablx on every push to main, and publishes it as a GitHub Release
# whenever package.json's "version" hasn't been released yet. Pushing without
# bumping the version just builds (a no-op publish-wise) — bump the version to
# cut a release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
      - run: npm run package

      - name: Check whether this version is already released
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if gh release view "v$version" >/dev/null 2>&1; then
            echo "cmdAbl v$version is already published — skipping release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "v$version" ./*.ablx \
            --title "cmdAbl v$version" \
            --generate-notes
