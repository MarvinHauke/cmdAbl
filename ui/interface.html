<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>cmdAbl</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       hsl(0, 0%, 13%);
      --bg-row:   hsl(0, 0%, 17%);
      --text:     hsl(0, 0%, 71%);
      --dim:      hsl(0, 0%, 38%);
      --accent:   hsl(31, 100%, 67%);
      --border:   hsl(0, 0%, 8%);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "JetBrains Mono", "Fira Code", monospace;
      font-size: 13px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body { display: flex; flex-direction: column; }

    /* ── input bar ── */
    #bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #colon {
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      user-select: none;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font: inherit;
      caret-color: var(--accent);
    }

    #mode-badge {
      font-size: 10px;
      color: var(--dim);
      user-select: none;
    }

    /* ── dropdown ── */
    #dropdown { flex: 1; overflow-y: auto; }
    #dropdown.hidden { display: none; }

    .row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 6px 12px;
      cursor: default;
    }

    .row.active { background: var(--bg-row); }
    .row.active .label { color: var(--accent); }

    .label { min-width: 90px; font-weight: 600; }
    .desc  { color: var(--dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

  <div id="bar">
    <span id="colon">:</span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" />
    <span id="mode-badge"></span>
  </div>

  <div id="dropdown"></div>

  <script>
    // Injected by the extension before the dialog opens.
    // Shape: Array<{ name: string, description: string, flags?: Array<{ name: string, description: string }> }>
    const COMMANDS = /*COMMANDS_PLACEHOLDER*/null;

    const input     = document.getElementById('input');
    const dropdown  = document.getElementById('dropdown');
    const modeBadge = document.getElementById('mode-badge');

    // Build lookup map for flag completions
    const cmdMap = Object.fromEntries(COMMANDS.map(c => [c.name, c]));

    let items     = [];   // current completion candidates
    let activeIdx = 0;
    let mode      = 'command'; // 'command' | 'flag'

    // ── messaging ──────────────────────────────────────────────────────────
    function send(value) {
      const msg = { method: 'close_and_send', params: [value] };
      if (window.webkit?.messageHandlers?.live) {
        window.webkit.messageHandlers.live.postMessage(msg);
      } else if (window.chrome?.webview) {
        window.chrome.webview.postMessage(msg);
      }
    }

    // ── parse input into phase ─────────────────────────────────────────────
    function parse(raw) {
      const spaceIdx = raw.indexOf(' ');
      if (spaceIdx === -1) {
        return { phase: 'command', query: raw.toLowerCase(), cmdName: null };
      }
      return {
        phase: 'flag',
        query: raw.slice(spaceIdx + 1).toLowerCase(),
        cmdName: raw.slice(0, spaceIdx),
      };
    }

    // ── build completion list ──────────────────────────────────────────────
    function computeItems(raw) {
      const { phase, query, cmdName } = parse(raw);
      mode = phase;

      if (phase === 'command') {
        return query
          ? COMMANDS.filter(c => c.name.startsWith(query) || c.name.includes(query))
          : COMMANDS;
      }

      // flag phase
      const cmd = cmdMap[cmdName ?? ''];
      if (!cmd?.flags?.length) return [];
      return query
        ? cmd.flags.filter(f => f.name.startsWith(query) || f.name.includes(query))
        : cmd.flags;
    }

    // ── resolve what string to send on selection ───────────────────────────
    function resolve(item) {
      if (mode === 'command') return item.name;
      const spaceIdx = input.value.indexOf(' ');
      const cmdName  = input.value.slice(0, spaceIdx);
      return `${cmdName} ${item.name}`;
    }

    // ── render ─────────────────────────────────────────────────────────────
    function render() {
      items     = computeItems(input.value);
      activeIdx = Math.min(activeIdx, Math.max(items.length - 1, 0));

      modeBadge.textContent = mode === 'flag' ? '--flag' : '';

      dropdown.innerHTML = '';

      if (!items.length) {
        dropdown.classList.add('hidden');
        return;
      }

      dropdown.classList.remove('hidden');

      items.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'row' + (i === activeIdx ? ' active' : '');
        row.innerHTML =
          `<span class="label">${item.name}</span><span class="desc">${item.description}</span>`;
        row.addEventListener('mousedown', e => { e.preventDefault(); send(resolve(item)); });
        dropdown.appendChild(row);
      });

      dropdown.querySelector('.active')?.scrollIntoView({ block: 'nearest' });
    }

    // ── keyboard ───────────────────────────────────────────────────────────
    input.addEventListener('input', () => { activeIdx = 0; render(); });

    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        e.preventDefault();
        send('');
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const item = items[activeIdx];
        const value = item ? resolve(item) : input.value.trim();
        if (value) send(value);
      } else if (e.key === 'Tab') {
        e.preventDefault();
        const item = items[activeIdx];
        if (!item) return;
        // Fill the selected item into the input; append a space after a command
        // so the user lands straight in flag-completion mode.
        input.value = mode === 'command' ? item.name + ' ' : resolve(item);
        activeIdx = 0;
        render();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (items.length) { activeIdx = (activeIdx + 1) % items.length; render(); }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (items.length) { activeIdx = (activeIdx - 1 + items.length) % items.length; render(); }
      }
    });

    // ── init ───────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => { render(); input.focus(); });
  </script>

</body>
</html>
