<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>cmdAbl</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       hsl(0, 0%, 13%);
      --bg-row:   hsl(0, 0%, 17%);
      --text:     hsl(0, 0%, 71%);
      --dim:      hsl(0, 0%, 38%);
      --accent:   hsl(31, 100%, 67%);
      --border:   hsl(0, 0%, 8%);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "JetBrains Mono", "Fira Code", monospace;
      font-size: 13px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body { display: flex; flex-direction: column; }

    /* ── input bar ── */
    #bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #colon {
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      user-select: none;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font: inherit;
      caret-color: var(--accent);
    }

    #mode-badge {
      font-size: 10px;
      color: var(--dim);
      user-select: none;
    }

    /* ── dropdown ── */
    #dropdown { flex: 1; overflow-y: auto; }
    #dropdown.hidden { display: none; }

    .row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 6px 12px;
      cursor: default;
    }

    .row.active { background: var(--bg-row); }
    .row.active .label { color: var(--accent); }

    .label { min-width: 90px; font-weight: 600; }
    .desc  { color: var(--dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

  <div id="bar">
    <span id="colon">:</span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" />
    <span id="mode-badge"></span>
  </div>

  <div id="dropdown"></div>

  <!-- Fuse.js, inlined as a `Fuse` global at build time. -->
  <script>/*FUSE_PLACEHOLDER*/</script>

  <script>
    // Injected by the extension before the dialog opens. PaletteItem[]:
    //   { id, type, title, subtitle?, keywords?, path?, route?, flags?: [{ name, description }] }
    const ITEMS = /*ITEMS_PLACEHOLDER*/null;

    const input     = document.getElementById('input');
    const dropdown  = document.getElementById('dropdown');
    const modeBadge = document.getElementById('mode-badge');

    const itemsById = Object.fromEntries(ITEMS.map(i => [i.id, i]));

    const fuseOpts = { threshold: 0.4, ignoreLocation: true };
    // 'path' lets a bare "/vermona/kick"-style query fuzzy-match a Live
    // object's address directly, on top of matching its bare name.
    const itemFuse = new Fuse(ITEMS, { ...fuseOpts, keys: ['title', 'subtitle', 'keywords', 'path'] });

    let items     = [];   // current completion candidates
    let activeIdx = 0;
    let mode      = 'command'; // 'command' | 'flag'

    // ── messaging ──────────────────────────────────────────────────────────
    // Returns a structured PaletteResult to the host as a JSON string (the
    // bridge can only carry one string); null/empty closes without acting.
    function send(result) {
      const payload = result == null ? '' : JSON.stringify(result);
      const msg = { method: 'close_and_send', params: [payload] };
      if (window.webkit?.messageHandlers?.live) {
        window.webkit.messageHandlers.live.postMessage(msg);
      } else if (window.chrome?.webview) {
        window.chrome.webview.postMessage(msg);
      }
    }

    // ── parse input into phase ─────────────────────────────────────────────
    // Once the first token names an actual registered command, everything
    // after it is *that command's argument text* — not a fresh fuzzy query
    // against the whole palette (which would let e.g. "mute Microtonic"
    // resolve to selecting the Microtonic track instead of running `mute`
    // with "Microtonic" as its argument). Commands with declared completable
    // flags get fuzzy-matched within those flags ('flag' phase); commands
    // that take raw arguments (mute/solo/…) get no completion at all
    // ('args' phase) — Enter falls through to rawResult(), which parses the
    // literal typed text. Otherwise stay in 'command' phase so names
    // containing spaces (e.g. a track called "Opal Lead") keep fuzzy-matching.
    function parse(raw) {
      const spaceIdx = raw.indexOf(' ');
      if (spaceIdx !== -1) {
        const cmdName = raw.slice(0, spaceIdx);
        const cmd = itemsById[cmdName];
        if (cmd?.type === 'command') {
          const rest = raw.slice(spaceIdx + 1);
          if (cmd.flags?.length) return { phase: 'flag', query: rest.trim(), cmdName };
          return { phase: 'args', query: rest, cmdName };
        }
      }
      return { phase: 'command', query: raw.trim(), cmdName: null };
    }

    // ── build completion list (fuzzy) ──────────────────────────────────────
    function computeItems(raw) {
      const { phase, query, cmdName } = parse(raw);
      mode = phase;

      if (phase === 'args') return []; // no completion — literal pass-through via rawResult()

      if (phase === 'command') {
        if (!query) return ITEMS;
        // Drop "canned full invocation" items (command-type, multi-word id —
        // e.g. a history entry "mute A, B") that the user has already typed
        // past — e.g. typing "mute A, B, C" after running "mute A, B" would
        // otherwise leave the shorter, stale row fuzzy-matched and active, so
        // Enter would silently run the old invocation instead of the new one.
        // Forward-completable matches (entry.startsWith(query)) stay.
        return itemFuse.search(query).map(r => r.item).filter(item =>
          !(item.type === 'command' && item.id.includes(' ')
            && query.length > item.id.length && query.startsWith(item.id)));
      }

      // flag phase
      const flags = itemsById[cmdName ?? '']?.flags ?? [];
      if (!flags.length || !query) return flags;
      const flagFuse = new Fuse(flags, { ...fuseOpts, keys: ['name', 'description'] });
      return flagFuse.search(query).map(r => r.item);
    }

    // ── row shape differs between phases (PaletteItem vs FlagDef) ────────────
    function labelOf(item) { return mode === 'command' ? item.title : item.name; }
    function descOf(item)  { return (mode === 'command' ? item.subtitle : item.description) ?? ''; }

    // ── structured payload for a chosen item ────────────────────────────────
    function resultFor(item) {
      if (mode === 'flag') {
        const cmdName = input.value.slice(0, input.value.indexOf(' '));
        return { type: 'command', id: cmdName, flags: [item.name] };
      }
      // A "canned full invocation" (command-type, multi-word id — e.g. a
      // history entry "mute A, B"): split it exactly like raw typed input
      // (rawResult, below) so it runs through the very same {id, flags} path
      // a fresh invocation would — the host never needs to know it came from
      // a stored entry rather than the keyboard.
      if (item.type === 'command' && item.id.includes(' ')) {
        const sp = item.id.indexOf(' ');
        return { type: 'command', id: item.id.slice(0, sp), flags: item.id.slice(sp + 1).split(/\s+/) };
      }
      // Command-phase item (command, track, device, …). Pass through
      // action/route/scope so the host can route and re-resolve Live objects.
      const result = { type: item.type, id: item.id };
      if (item.action !== undefined) result.action = item.action;
      if (item.route !== undefined) result.route = item.route;
      if (item.scope !== undefined) result.scope = item.scope;
      return result;
    }

    // ── structured payload for free-typed input (no active item) ─────────────
    function rawResult() {
      const raw = input.value.trim();
      if (!raw) return null;
      const sp = raw.indexOf(' ');
      if (sp === -1) return { type: 'command', id: raw };
      return { type: 'command', id: raw.slice(0, sp), flags: raw.slice(sp + 1).split(/\s+/) };
    }

    // ── render ─────────────────────────────────────────────────────────────
    function render() {
      items     = computeItems(input.value);
      activeIdx = Math.min(activeIdx, Math.max(items.length - 1, 0));

      modeBadge.textContent = mode === 'flag' ? '--flag' : '';

      dropdown.innerHTML = '';

      if (!items.length) {
        dropdown.classList.add('hidden');
        return;
      }

      dropdown.classList.remove('hidden');

      items.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'row' + (i === activeIdx ? ' active' : '');
        // textContent, not innerHTML: item titles may be user data (track names).
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = labelOf(item);
        const desc = document.createElement('span');
        desc.className = 'desc';
        desc.textContent = descOf(item);
        row.append(label, desc);
        row.addEventListener('mousedown', e => { e.preventDefault(); send(resultFor(item)); });
        dropdown.appendChild(row);
      });

      dropdown.querySelector('.active')?.scrollIntoView({ block: 'nearest' });
    }

    // ── keyboard ───────────────────────────────────────────────────────────
    input.addEventListener('input', () => { activeIdx = 0; render(); });

    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        e.preventDefault();
        send(null);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const item = items[activeIdx];
        const result = item ? resultFor(item) : rawResult();
        if (result) send(result);
      } else if (e.key === 'Tab') {
        e.preventDefault();
        const item = items[activeIdx];
        if (!item) return;
        // Tab only autocompletes the highlighted item into the input — it never
        // executes. The user commits with Enter (and can edit / add flags first).
        if (mode === 'command') {
          // Commands get a trailing space so you land in flag completion. Live
          // objects fill their *path*, not their bare name — names collide
          // constantly (multiple devices/tracks called "DefaultTracks", "EQ
          // Eight", …), so completing to the name would just re-match every
          // same-named object and strand you on an arbitrary one of them. The
          // path is what's actually unique enough to land back on this object.
          input.value = item.type === 'command' ? item.id + ' ' : (item.path ?? item.title);
        } else {
          input.value = input.value.slice(0, input.value.indexOf(' ')) + ' ' + item.name;
        }
        activeIdx = 0;
        render();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (items.length) { activeIdx = (activeIdx + 1) % items.length; render(); }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (items.length) { activeIdx = (activeIdx - 1 + items.length) % items.length; render(); }
      }
    });

    // ── init ───────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => { render(); input.focus(); });
  </script>

</body>
</html>
